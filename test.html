<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphique Chart.js</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      gap: 20px;
    }

    .chart-container {
      width: 300px;
      height: 300px;
      position: relative;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>
</head>

<body>

  <button id="btn">Cliquez ici</button>

  <div class="chart-container">
    <canvas 
      id="myChart"
      aria-label="Graphique de données"
      role="img">
    </canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    const ctx = document.querySelector("#myChart");

    new Chart(ctx, {
      type: "pie",

      data: {
        labels: [
          "Production de vin en %",
          "Production de tire-bouchons personnalisés en %",
          "Production de fromage en %"
        ],

        datasets: [{
          data: [60, 10, 30],
          backgroundColor: [
            "rgb(255, 99, 132)",
            "rgb(54, 162, 235)",
            "rgb(255, 205, 86)"
          ],
          hoverOffset: 4
        }]
      },

      options: {
        responsive: true,
        maintainAspectRatio: false
      }
    });

    const btn = document.getElementById("btn");
    btn.onclick = () => alert("btn cliqué");
  </script>

</body>
</html>
