<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu Burger Responsive</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: #333;
            padding: 10px 20px;
            position: relative;
        }

        .hamburger {
            display: none;
            cursor: pointer;
            color: white;
            font-size: 24px;
            z-index: 1000;
        }

        .menu {
            display: none; /* Cache le menu par défaut */
            background-color: #333;
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            z-index: 999;
            padding: 20px 0;
            flex-direction: column;
            align-items: center;
        }

        .menu.active {
            display: flex; /* Affiche le menu quand active */
        }

        .menu a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            transition: background 0.3s;
        }

        .menu a:hover {
            background-color: #555;
        }

        /* Responsive : Affiche le burger et adapte le menu */
        @media (max-width: 768px) {
            .hamburger {
                display: block;
            }

            .menu {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: #333;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 0;
            }

            .menu a {
                padding: 15px 20px;
                flex: 1;
            }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <nav class="menu" id="menu">
            <a href="#">Accueil</a>
            <a href="#">À propos</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
            <a href="#">Profil</a>
        </nav>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.classList.toggle('active');
        }
    </script>

</body>
</html>
