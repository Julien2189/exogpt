<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
}

#ouvrirModal {
    padding: 12px 22px;
    border: none;
    border-radius: 10px;
    background: #00b894;
    color: white;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
}

#ouvrirModal:hover {
    background: #019875;
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    width: 320px;
    min-height: 250px;
    padding: 30px;
    border-radius: 18px;
    position: relative;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
}

#fermer {
    color: red;
    position: absolute;
    top: 12px;
    right: 15px;
    cursor: pointer;
    font-weight: bold;
    font-size: 20px;
}

#fermer:hover {
    transform: scale(1.2);
}

.card {
    background: #f4f7fb;
    border-radius: 12px;
    padding: 20px;
    margin-top: 15px;
}

.card h2 {
    color: #1e3c72;
    margin-bottom: 10px;
}

.card p {
    color: #333;
}
    </style>
</head>
<body>
    <button id="ouvrirModal">Ovrir le modal</button>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="card">
            <h2>modal</h2>
            </div>
            <div class="card">
            <p>Modal facile</p>
            </div>

            <span id="fermer">X</span>
        </div>
    </div>
    <script>
        const ouvrirModal = document.getElementById('ouvrirModal') ;
        const fermer = document.getElementById('fermer') ; 
        const modal = document.getElementById('modal') ;

        ouvrirModal.addEventListener(('click') ,() =>{
            modal.style.display = "flex" ; 
        });

        fermer.addEventListener(("click") , () =>{
            modal.style.display = "none"; 
        })
    </script>
</body>
</html>
